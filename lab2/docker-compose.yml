services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spark
      POSTGRES_PASSWORD: spark
      POSTGRES_DB: casino_dw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spark -d casino_dw"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  producer:
    build: ./producer
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: casino_games
      CSV_PATH: /data/online_casino_games_dataset_v2.csv
      SEND_INTERVAL_SEC: "3"
      ROWS_PER_TICK: "50"
    volumes:
      - ./data:/data:ro

  spark-streaming:
    build: ./spark
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPARK_KAFKA_BOOTSTRAP: kafka:9092
      SPARK_KAFKA_TOPIC: casino_games
      SPARK_CHECKPOINT_LOCATION: /tmp/spark-checkpoint
      JDBC_URL: jdbc:postgresql://postgres:5432/casino_dw
      JDBC_USER: spark
      JDBC_PASSWORD: spark
    volumes:
      - spark_checkpoint:/tmp/spark-checkpoint

volumes:
  postgres_data:
  spark_checkpoint:
